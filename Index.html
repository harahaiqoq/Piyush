<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piyush Joshi | Elite Birthday</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #3b82f6; /* Electric Blue */
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body {
            background-color: var(--bg);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* Animated Mesh Background */
        .mesh {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 20% 30%, #1e1b4b 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #1e3a8a 0%, transparent 40%);
            opacity: 0.5;
        }

        /* --- Welcome/Countdown Container --- */
        #welcome-screen {
            text-align: center;
            padding: 40px;
            width: 90%; max-width: 600px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        .timer {
            font-size: 3.5rem; font-weight: 800; color: var(--accent);
            margin: 30px 0; text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        /* --- Birthday Mode (Hidden Initially) --- */
        #birthday-screen {
            display: none;
            width: 95%; max-width: 1000px;
            margin: 50px auto;
            text-align: center;
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        .bday-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 60px 40px;
        }

        .bday-title { font-size: 4rem; font-weight: 800; background: linear-gradient(to right, #60a5fa, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .wish-text { font-size: 1.2rem; color: #94a3b8; line-height: 1.8; margin: 30px 0; max-width: 700px; margin-left: auto; margin-right: auto; }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; margin-top: 50px;
        }

        .photo-box {
            position: relative; height: 350px;
            border-radius: 30px; overflow: hidden;
            border: 1px solid var(--glass-border);
            cursor: pointer; transition: 0.5s ease;
        }

        .photo-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .photo-box:hover img { transform: scale(1.1); filter: brightness(0.5); }

        .photo-box::after {
            content: "Bhai Party Chaiye! 🍗🍻";
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            opacity: 0; font-weight: 800; font-size: 1.3rem; transition: 0.4s;
        }
        .photo-box:hover::after { opacity: 1; }

        /* Buttons */
        .btn {
            padding: 16px 40px; border-radius: 100px; border: none;
            background: var(--accent); color: #fff; font-weight: 700;
            cursor: pointer; transition: 0.3s; margin: 10px;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        .footer { margin-top: 60px; font-size: 0.8rem; letter-spacing: 4px; color: #444; text-transform: uppercase; }

    </style>
</head>
<body>

    <div class="mesh"></div>

    <div id="welcome-screen">
        <p style="color: var(--accent); font-weight: 600; letter-spacing: 2px;">WELCOME PIYUSH BHAI</p>
        <h1>Something is Cooking...</h1>
        <div class="timer" id="countdown-timer">00:00:00</div>
        <button class="btn" id="pre-music-btn" onclick="togglePreMusic()">Listen to Memories 🎵</button>
    </div>

    <div id="birthday-screen">
        <div class="bday-card">
            <h1 class="bday-title">Happy Birthday, Piyush!</h1>
            <p class="wish-text">
                Mere bhai, janamdin ki dheron badhaiyan! Tu hamesha life mein top par rahe aur apni har ek manzil ko hasil kare. Bas hamesha aise hi bhai bana rahe. <br>
                <b>Party pending hai, taiyaar rehna!</b>
            </p>

            <button class="btn" onclick="toggleBdayMusic()" id="bday-music-btn">Start Celebration 🎊</button>

            <div class="gallery">
                <div class="photo-box" onclick="alert('Piyush: Bhai Party Pakka Milegi! 🥳')">
                    <img src="piyush1.png" alt="Memory 1" onerror="this.src='https://via.placeholder.com/300x400?text=Piyush+1'">
                </div>
                <div class="photo-box" onclick="alert('Piyush: Aaj toh Party Hard! 🍗')">
                    <img src="piyush2.png" alt="Memory 2" onerror="this.src='https://via.placeholder.com/300x400?text=Piyush+2'">
                </div>
                <div class="photo-box" onclick="alert('Piyush: Party Chaiye Mujhe! 🍻')">
                    <img src="piyush3.png" alt="Memory 3" onerror="this.src='https://via.placeholder.com/300x400?text=Piyush+3'">
                </div>
            </div>

            <p class="footer">MADE BY HARSH WITH ❤️</p>
        </div>
    </div>

    <audio id="preSong" loop> <source src="pre_song.mp3" type="audio/mpeg"> </audio>
    <audio id="bdaySong" loop> <source src="bday_song.mp3" type="audio/mpeg"> </audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // Set Date: March 21, 2026
        const targetDate = new Date("March 21, 2026 00:00:00").getTime();
        const preSong = document.getElementById("preSong");
        const bdaySong = document.getElementById("bdaySong");

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown-timer").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

            if (distance < 0) {
                clearInterval(x);
                unlockCelebration();
            }
        }, 1000);

        function togglePreMusic() {
            if (preSong.paused) { preSong.play(); document.getElementById("pre-music-btn").innerText = "Pause Memories ⏸️"; } 
            else { preSong.pause(); document.getElementById("pre-music-btn").innerText = "Listen to Memories 🎵"; }
        }

        function toggleBdayMusic() {
            if (bdaySong.paused) { bdaySong.play(); document.getElementById("bday-music-btn").innerText = "Pause Music ⏸️"; } 
            else { bdaySong.pause(); document.getElementById("bday-music-btn").innerText = "Start Celebration 🎊"; }
        }

        function unlockCelebration() {
            preSong.pause(); 
            document.getElementById("welcome-screen").style.display = "none";
            document.getElementById("birthday-screen").style.display = "block";
            
            // Auto Confetti Blast
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
        }

        // --- TESTING: Is line ko uncomment karein design check karne ke liye ---
        // unlockCelebration();
    </script>
</body>
</html>
