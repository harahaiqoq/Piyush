<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piyush Joshi | Exclusive</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; text-align: center; cursor: pointer; }
        
        .glass-container {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 50px; border-radius: 50px;
            width: 90%; max-width: 500px; position: relative;
        }

        h2 { font-family: 'Syncopate', sans-serif; font-size: 0.6rem; letter-spacing: 10px; color: var(--accent); margin-bottom: 20px; opacity: 0.7; }
        .timer { font-size: clamp(1.5rem, 6vw, 3rem); font-weight: 800; margin: 30px 0; background: linear-gradient(#fff, #444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .btn-pro {
            padding: 18px 40px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3);
            font-weight: 800; cursor: not-allowed; transition: 0.4s; letter-spacing: 2px;
        }
        .btn-active { background: #fff; color: #000; cursor: pointer; opacity: 1; box-shadow: 0 10px 30px rgba(0,242,255,0.3); border: none; }
        
        .music-status { position: fixed; bottom: 30px; width: 200px; left: 50%; transform: translateX(-50%); }
        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 8px; overflow: hidden; }
        #progressBar { width: 0%; height: 100%; background: var(--accent); }

        .harsh-sig { position: fixed; top: 30px; font-size: 0.6rem; letter-spacing: 6px; color: rgba(255,255,255,0.1); font-weight: 800; text-transform: uppercase; }
        #welcome-gate { display: none; opacity: 0; transform: translateY(20px); transition: 1s; }
    </style>
</head>
<body onclick="playPreMusic()">

    <div class="harsh-sig">MADE BY HARSH</div>

    <div id="countdown-screen" class="glass-container">
        <h2>REVEAL ON 21 MARCH</h2>
        <div class="timer" id="timer">00D 00H 00M 00S</div>
        <button id="mainBtn" class="btn-pro" onclick="showWelcome()">LOCKED 🔒</button>
    </div>

    <div id="welcome-gate" class="glass-container">
        <h1 style="font-size: 2.5rem; margin-bottom: 20px;">Welcome <br> Piyush Joshi</h1>
        <p style="color:#888; margin-bottom:30px;">Taiyaar ho? Chaliye andar dekhte hain...</p>
        <button class="btn-pro btn-active" onclick="window.location.href='birthday.html'">ENTER THE VIBE →</button>
    </div>

    <div class="music-status">
        <div class="progress-container"><div id="progressBar"></div></div>
    </div>

    <audio id="preSong" loop> <source src="pre_song.mp3" type="audio/mpeg"> </audio>

    <script>
        let music = false;
        const song = document.getElementById('preSong');
        const progress = document.getElementById('progressBar');

        function playPreMusic() { if(!music) { song.play(); music = true; } }

        song.ontimeupdate = () => { progress.style.width = (song.currentTime/song.duration)*100 + "%"; };

        const target = new Date("March 21, 2026 00:00:00").getTime();
        setInterval(() => {
            const diff = target - new Date().getTime();
            const d = Math.floor(diff/(1000*60*60*24)), h = Math.floor((diff%(1000*60*60*24))/(1000*60*60)), m = Math.floor((diff%(1000*60*60))/(1000*60)), s = Math.floor((diff%(1000*60))/1000);
            document.getElementById("timer").innerHTML = `${d}D ${h}H ${m}M ${s}S`;
            if (diff < 0) { document.getElementById("mainBtn").classList.add("btn-active"); document.getElementById("mainBtn").innerHTML = "UNLOCK 🔓"; }
        }, 1000);

        function showWelcome() {
            if(document.getElementById("mainBtn").classList.contains("btn-active")) {
                document.getElementById("countdown-screen").style.opacity = "0";
                setTimeout(() => {
                    document.getElementById("countdown-screen").style.display = "none";
                    const gate = document.getElementById("welcome-gate");
                    gate.style.display = "block";
                    setTimeout(() => { gate.style.opacity = "1"; gate.style.transform = "translateY(0)"; }, 100);
                }, 800);
            }
        }
    </script>
</body>
</html>
